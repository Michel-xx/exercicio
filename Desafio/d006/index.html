<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em Html</h1>
    <p>Em HTML5, podemos os elementos da lista a seguir. passe o mouse sobre eles para descobrir qual tag deve utilizar em cada caso</p>
    <ul>
        <li><abbr title="Basta utilizar a tag &lt;p&gt;">Parágrafo</abbr>
        <li><abbr title="Basta utilizar a tag &lt;h1&gt;">Título de Nível 1</abbr>
        <li><abbr title="Basta utilizar a tag &lt;h2&gt;">Título de Nível 2</abbr>
        <li><abbr title="basta utilizar a tag &lt;link rel=&quot;stylesheet&quot; href=&quot;&quot;&gt;">Link</abbr>
        <li><abbr title="basta utilizar a tag &lt;img src=&quot;&quot; alt=&quot;&quot;&gt;">Imagem</abbr>
        <li><abbr title="basta utilizar a tag &lt;ul&gt;">Lista Não Ordenada</abbr>
        <li><abbr title="basta utilizar a tag &lt;ol&gt;">Lista Ordenada</abbr>
        <li><abbr title="basta utilizar a tag &lt;li&gt;">Item de Lista</abbr>
    </ul>
</body>
</html>
