<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens dinâmicas</title>
</head>
<body>
    <h1>Imagens adaptativas</h1>
    <p>se você redimensionar a janela ou trocar de dispositivo a imagem ira se adaptar</p>
    <picture>
        <source media="(max-width: 722px)" srcset="imagens/pequeno.png" type="image/png">
        <source media="(max-width: 1022px)" srcset="imagens/medio.png" type="image/png">
        <img src="imagens/grande.png" alt="imagem flexivel">
    </picture>
    <audio controls>
        <source src="midia/Échappé - Dan Bodan.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
