<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'MinhaFonte';
            src: url('fontes/Super Starfish.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*
                    Tipos de format()
                    - openttype (otf)
                    - truetype (ttf)
                    - embedded opentype
                    - truetype-aat (Apple Advanced Typography)
                    - svg
            */
        }
        body {
            font-family: 'MinhaFonte', Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 60px;
        }
    
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Hic ab aperiam consequuntur officiis corrupti odio, illo laboriosam optio architecto. Ipsa eveniet amet, sed explicabo ipsam eligendi exercitationem sunt repudiandae consequatur.</p>
</body>
</html>
