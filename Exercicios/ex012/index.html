<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hospedagem de videos</title>
</head>
<body>
    <h1>videos hospedados</h1>
    <hr>
    <h2>inserindo video hospedados localmente</h2>
    <p>Este é um exemplo de video hospedado localmente.</p>
    <video width="500" controls autoplay loop>
        <source src="midia/video1.mp4" type="video/mp4">
    </video>
    <h2>Inserindo videos do youtube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/FO7kaMp4hMU?si=IRh7kv3QwOlp12Eo" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
