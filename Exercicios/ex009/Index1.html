<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista</title>
</head>
<body>
    <h1>Lista</h1>
    <h2>Listas Ordenadas</h2>
    <ol>
        <li>Primeiro item
        <li>Segundo item
        <li>Terceiro item
    </ol>
    <ol type="1" start="4">  <!-- para mudar o formato de número para letra basta colocar type="I" -->  
        <li>Quarto item
        <li>Quinto item
        <li>Sexto item
    </ol>
    <h2>Listas Não Ordenadas</h2> <!-- para mudar o formato de redondo para quadrado basta colocar type="square" -->
    <ul>
        <li>manteiga
        <li>pão
        <li>leite
    </ul>
</body>
</html>
